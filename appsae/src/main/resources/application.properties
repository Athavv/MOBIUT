spring.application.name=appsae

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/sae_archive?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sae_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sae_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:AppSAEsecretKeyForJWTtokenGenerationMMI3IUTMLVMeaux2026}
app.jwt.expiration-milliseconds=86400000

# Mot de passe du compte créé au démarrage si aucun utilisateur "admin" n'existe (variable d'environnement optionnelle)
app.admin.initial-password=${ADMIN_INITIAL_PASSWORD:admin}

server.port=8080

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
